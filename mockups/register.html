<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <a href="dashboard.html" class="logo">CESDE</a>

    <div class="nav-links">
        <a href="notes.html">Registro de notas</a>
        <a href="assists.html">Asistencias</a>
    </div>

    <div>
        <a href="login.html" class="login-link">Iniciar sesión</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h1>Crear cuenta</h1>

        <div class="form-group">
            <label>Nombres</label>
            <input type="text" placeholder="Fulanito">
        </div>

        <div class="form-group">
            <label>Apellidos</label>
            <input type="text" placeholder="Detal">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="fulanito@cesde.net">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" placeholder="1234567890">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" placeholder="********">
        </div>

        <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" placeholder="********">
        </div>

        <div class="center">
            <button class="btn">Crear cuenta</button>
        </div>

        <p class="center" style="margin-top:20px;">
            ¿Ya tienes cuenta? <a href="login.html" class="link">Iniciar sesión</a>
        </p>

    </div>
</div>

</body>
</html>
